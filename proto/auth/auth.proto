syntax = "proto3";

package auth;

// import "common/request_status.proto";
import "common/base_response.proto";
import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/abu-umair/resto-microservice/pb/auth";


service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc LoginWithGoogle(LoginWithGoogleRequest) returns (LoginWithGoogleResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc Verify(VerifyRequest) returns (VerifyResponse);
  rpc RequestOTP(RequestOTPRequest) returns (RequestOTPResponse);
  // Email link (web)
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  rpc RequestVerify(RequestVerifyRequest) returns (RequestVerifyResponse);
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ChangePasswordPublic(ChangePasswordPublicRequest) returns (ChangePasswordPublicResponse);
  
  //user 
  rpc GetProfileUser(GetProfileUserRequest) returns (GetProfileUserResponse);
}

message RegisterRequest {
  string full_name = 1 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  string email = 2 [(buf.validate.field).string = { email: true, min_len: 1, max_len: 255 }];
  string password = 3 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  string password_confirmation = 4 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
}

message RegisterResponse {
  common.BaseResponse base = 1;
}

message LoginRequest { 
  string email = 1 [(buf.validate.field).string = { email: true, min_len: 1, max_len: 255 }];
  string password = 2 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
}

message LoginResponse { 
  common.BaseResponse base = 1;
  string access_token = 2;
}

message LoginWithGoogleRequest { 
  string email = 1 [(buf.validate.field).string = { email: true, min_len: 1, max_len: 255 }];
  string full_name = 2 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  optional string avatar = 3 [(buf.validate.field).string = { max_len: 255}];

}

message LoginWithGoogleResponse { 
  common.BaseResponse base = 1;
  string access_token = 2;
} 

message LogoutRequest { 

}

message LogoutResponse { 
  common.BaseResponse base = 1;
}

// ChangePassword
message ChangePasswordRequest { 
string old_password = 1 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  string new_password = 2 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  string new_password_confirmation = 3 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
}

message ChangePasswordResponse { 
  common.BaseResponse base = 1;
}

message GetProfileRequest { 

}

message GetProfileResponse { 
  common.BaseResponse base = 1;
  string user_id = 2;
  string full_name = 3;
  string email = 4;
  string role_code = 5;
  google.protobuf.Timestamp member_since = 6;
  google.protobuf.Timestamp verified_at = 7;
}

message GetProfileUserRequest { 

}

message GetProfileUserResponse { 
  common.BaseResponse base = 1;
  string user_id = 2;
  string full_name = 3;
  string email = 4;
  string role_code = 5;
  google.protobuf.Timestamp member_since = 6;
  google.protobuf.Timestamp verified_at = 7;
}

message VerifyRequest { 
  string code_otp = 1 [(buf.validate.field).string = { min_len: 6, max_len: 6 }];

}

message VerifyResponse { 
  common.BaseResponse base = 1;

}

message RequestOTPRequest { 

}

message RequestOTPResponse { 
  common.BaseResponse base = 1;
}

message VerifyEmailRequest { 
  string code_otp = 1 [(buf.validate.field).string = { min_len: 6, max_len: 255 }];
  string email = 2 [(buf.validate.field).string = { email: true, min_len: 1, max_len: 255 }];
}

message VerifyEmailResponse { 
  common.BaseResponse base = 1;

}

message RequestVerifyRequest { 
  string email = 1 [(buf.validate.field).string = { email: true, min_len: 1, max_len: 255 }];

}

message RequestVerifyResponse { 
  common.BaseResponse base = 1;
  // common.RequestStatus status = 2;
  // int32 retry_after_seconds = 3;
}

message ForgotPasswordRequest { 
  string email = 1 [(buf.validate.field).string = { email: true, min_len: 1, max_len: 255 }];

}

message ForgotPasswordResponse { 
  common.BaseResponse base = 1;
  // common.RequestStatus status = 2;
  // int32 retry_after_seconds = 3;
}

// ChangePasswordWithEmail
message ChangePasswordPublicRequest { 
  string code_otp = 1 [(buf.validate.field).string = { min_len: 6, max_len: 255 }];
  string email = 2 [(buf.validate.field).string = { email: true, min_len: 1, max_len: 255 }];
  string new_password = 3 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  string new_password_confirmation = 4 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
}

message ChangePasswordPublicResponse { 
  common.BaseResponse base = 1;
}