syntax = "proto3";

option go_package = "github.com/abu-umair/be-lms-go/pb/cart";

import "common/base_response.proto";
import "buf/validate/validate.proto";

package cart;

service CartService {
  rpc AddCourseToCart(AddCourseToCartRequest) returns (AddCourseToCartResponse);
  rpc ListCart(ListCartRequest) returns (ListCartResponse);
  rpc DeleteCart(DeleteCartRequest) returns (DeleteCartResponse);
  rpc UpdateCartQuantity(UpdateCartQuantityRequest) returns (UpdateCartQuantityResponse);

}

message AddCourseToCartRequest {
  string course_id = 1[(buf.validate.field).string = { min_len: 1, max_len: 255 }];
}

message AddCourseToCartResponse {
  common.BaseResponse base = 1;
  string id=2;
}

message ListCartRequest {}//?dikosongin, karena tidak memakai apapun, pagination jg tidak digunakan

message ListCartResponseItem {
  string cart_id = 1;
  string course_id = 2;
  string course_name = 3;
  string course_image_url = 4;
  double course_price = 5; 
  int64 quantity = 6;
}

message ListCartResponse {
  common.BaseResponse base = 1;
  repeated ListCartResponseItem items = 2; //?sebuah array
}

message DeleteCartRequest {
  string cart_id = 1 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
}

message DeleteCartResponse {
  common.BaseResponse base = 1;
}

message UpdateCartQuantityRequest {
  string cart_id = 1 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  int64 new_quantity = 2 [(buf.validate.field).int64.gte = 0]; //?validasi gte = 0 artinya memungkinkan 0 ( tidak boleh negatif), jika 0 maka dihapus 
}

message UpdateCartQuantityResponse {
  common.BaseResponse base = 1;
}