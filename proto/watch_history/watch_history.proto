syntax = "proto3";

package watch_history;

import "common/base_response.proto";
import "buf/validate/validate.proto";
import "google/protobuf/field_mask.proto";

option go_package = "github.com/abu-umair/be-lms-go/pb/watch_history";


service WatchHistoryService {
    rpc WatchLessonId (WatchLessonIdRequest) returns (WatchLessonIdResponse);
    rpc EditWatchHistory (EditWatchHistoryRequest) returns (EditWatchHistoryResponse);
    rpc EditLessonCompletion (EditLessonCompletionRequest) returns (EditLessonCompletionResponse);
    // rpc LastWatchHistory (LastWatchHistoryRequest) returns (LastWatchHistoryResponse);
    // rpc EditWatchHistory (EditWatchHistoryRequest) returns (EditWatchHistoryResponse);
    
}

message WatchLessonIdRequest {
  string course_id = 1;
  google.protobuf.FieldMask field_mask = 2;
}

message WatchLessonIdResponse {
  common.BaseResponse base = 1;
  repeated WatchHistoryInfo watched_lesson_id = 2; // 'repeated' untuk array/slice
  repeated WatchHistoryInfo last_watch_history = 3; 
  int32 lesson_count = 4; 
}


message WatchHistoryInfo {
string id = 1;
optional string user_id = 2;
optional string course_id = 3;
optional string chapter_id = 4;
optional string lesson_id = 5;
optional string is_completed = 6;

optional string created_at = 7;
optional string created_by = 8;
optional string deleted_by = 9;
optional string updated_at = 10;
optional string updated_by = 11;
optional string deleted_at = 12;
}


message EditWatchHistoryRequest {
  optional string id = 1 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  string user_id = 2 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  string course_id = 3 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  string chapter_id = 4 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  string lesson_id = 5 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
}

message EditWatchHistoryResponse {
  common.BaseResponse base = 1;
  string id = 2;

}

message EditLessonCompletionRequest {
  string course_id = 3 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  string chapter_id = 4 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  string lesson_id = 5 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
  bool is_completed = 6;
}

message EditLessonCompletionResponse {
  common.BaseResponse base = 1;
}

